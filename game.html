
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOBA Game Prototype</title>
<style>
    * {
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Arial', 'Segoe UI', sans-serif;
    }

    .game-container {
        background: #2c2c2c;
        padding: 10px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    canvas {
        display: block;
        margin: 0 auto;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        cursor: crosshair;
    }

    @keyframes damage {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-30px); }
    }

    .damage-number {
        position: absolute;
        color: red;
        font-weight: bold;
        font-size: 20px;
        pointer-events: none;
        animation: damage 0.5s ease-out forwards;
    }
</style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1200" height="600"></canvas>
    </div>
</div>

<div class="settings-btn" id="settingsBtn">⚙️</div>

<div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
        <div class="settings-header">SETTINGS</div>
        
        <div class="setting-row">
            <span>Difficulty</span>
            <div class="toggle-group" id="diffGroup">
                <span class="toggle-opt" data-value="easy">Easy</span>
                <span class="toggle-opt active" data-value="normal">Normal</span>
                <span class="toggle-opt" data-value="hard">Hard</span>
            </div>
        </div>

        <div class="setting-row">
            <span>Attack Range</span>
            <span class="toggle-opt" data-value="showRange" id="rangeToggle">Show</span>
        </div>

        <div class="setting-row">
            <span>Controls</span>
            <span style="color:#aaa;font-size:13px;">Click to move | Q W E = Skills</span>
        </div>

        <div class="setting-row">
            <span>Edit Mode (drag skills)</span>
            <span class="toggle-opt" id="editModeToggle">Off</span>
        </div>

        <div id="editModeActions" style="display:none;margin-top:10px;">
            <div style="display:flex;gap:10px;">
                <span class="toggle-opt" id="saveLayoutBtn" style="flex:1;text-align:center;background:#2d7a2d;color:#fff;">Save Layout</span>
                <span class="toggle-opt" id="resetLayoutBtn" style="flex:1;text-align:center;background:#7a2d2d;color:#fff;">Reset</span>
            </div>
            <div style="color:#888;font-size:12px;margin-top:8px;text-align:center;">Drag the skill circles to reposition</div>
        </div>

        <div class="settings-close" id="settingsClose">Close</div>
    </div>
</div>

<div class="skill-panel" id="skillPanel">
    <div class="skill-btn" data-skill="q" id="skillQ">
        <div class="skill-circle">
            <span class="skill-key">Q</span>
            <span class="skill-cd" id="cd-q"></span>
        </div>
        <span class="skill-mp">20</span>
    </div>
    <div class="skill-btn" data-skill="w" id="skillW">
        <div class="skill-circle">
            <span class="skill-key">W</span>
            <span class="skill-cd" id="cd-w"></span>
        </div>
        <span class="skill-mp">35</span>
    </div>
    <div class="skill-btn" data-skill="e" id="skillE">
        <div class="skill-circle">
            <span class="skill-key">E</span>
            <span class="skill-cd" id="cd-e"></span>
        </div>
        <span class="skill-mp">25</span>
    </div>
</div>

<style>
.skill-panel {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: row;
    gap: 16px;
    z-index: 100;
    align-items: flex-end;
    background: rgba(0,0,0,0.35);
    padding: 10px 18px;
    border-radius: 16px;
}
.skill-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
}
.skill-btn:active .skill-circle { transform: scale(0.9); }
.skill-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
    border: 2.5px solid #ffd700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 -2px 6px rgba(0,0,0,0.3);
    transition: transform 0.1s;
}
.skill-btn.disabled .skill-circle { border-color: #444; }
.skill-key {
    font-size: 22px;
    font-weight: bold;
    color: #ffd700;
    line-height: 1;
}
.skill-btn.disabled .skill-key { color: #555; }
.skill-mp {
    font-size: 9px;
    color: #6bb5ff;
    font-weight: bold;
    background: rgba(0,0,0,0.6);
    padding: 1px 6px;
    border-radius: 8px;
}
.skill-cd {
    display: none;
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    align-items: center;
    justify-content: center;
}
.skill-btn.on-cooldown .skill-cd { display: flex; }
.skill-btn.on-cooldown .skill-key { display: none; }
.skill-btn.no-mana .skill-circle { border-color: #444; }
.skill-btn.no-mana .skill-key { color: #555; }

.settings-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 26px;
    cursor: pointer;
    z-index: 200;
    width: 44px;
    height: 44px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
}
.settings-btn:hover { transform: rotate(60deg); }

.settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    align-items: center;
    justify-content: center;
}
.settings-overlay.open { display: flex; }

.settings-panel {
    background: #2c2c2c;
    border: 2px solid #ffd700;
    border-radius: 16px;
    padding: 25px 30px;
    width: 340px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}
.settings-header {
    font-size: 22px;
    font-weight: bold;
    color: #ffd700;
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 2px;
}
.setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;

}
.toggle-group { display: flex; gap: 6px; }
.toggle-opt {
    padding: 4px 12px;
    border-radius: 8px;
    background: #444;

    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}
.toggle-opt.active { background: #ffd700; color: #222; font-weight: bold; }
.toggle-opt:hover { background: #666; color: #fff; }

.settings-close {
    text-align: center;
    margin-top: 18px;
    padding: 8px;
    background: #444;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}
.settings-close:hover { background: #666; }

.range-visible .skill-circle { border-color: #ffd700; }

.edit-mode .skill-btn { z-index: 500; }
.edit-mode .skill-circle {
    border-color: #00ff88 !important;
    box-shadow: 0 0 20px rgba(0,255,136,0.4), 0 3px 10px rgba(0,0,0,0.5) !important;
    cursor: grab;
}
.edit-mode .skill-circle:active { cursor: grabbing; }
.edit-mode .skill-panel,
.skill-panel.has-custom { transform: none; background: none; padding: 0; }
.edit-mode .skill-panel .skill-btn,
.skill-btn[data-custom-pos] { position: fixed !important; }
.skill-btn.dragging { opacity: 0.85; z-index: 999 !important; }
.skill-btn.dragging .skill-circle { transform: scale(1.1); }
</style>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const skillKeys = ['q', 'w', 'e'];

    let gameSettings = {
        difficulty: 'normal',
        showRange: true
    };

    // Game state
    let score = 0;
    let gameRunning = true;
    let particles = [];
    let wave = 0;
    let minions = [];
    let waveCountdown = 0;
    let waveDelay = 3000;

    // Player
    const player = {
        x: 200,
        y: 300,
        width: 40,
        height: 40,
        health: 100,
        maxHealth: 100,
        mana: 100,
        maxMana: 100,
        manaRegen: 10,
        attackDamage: 15,
        attackRange: 100,
        attackSpeed: 0.6,
        moveSpeed: 300,
        targetX: null,
        targetY: null,
        color: '#4a90e2'
    };

    // Enemy AI
    const enemy = {
        x: 1000,
        y: 300,
        width: 40,
        height: 40,
        health: 100,
        maxHealth: 100,
        attackDamage: 12,
        attackRange: 100,
        attackSpeed: 0.5,
        moveSpeed: 250,
        color: '#e24a4a'
    };

    // Skill system
    const skills = {
        q: {
            cooldown: 0,
            maxCooldown: 3000, // milliseconds
            manaCost: 20,
            damage: 30,
            name: 'Fire Strike'
        },
        w: {
            cooldown: 0,
            maxCooldown: 5000,
            manaCost: 35,
            damage: 45,
            name: 'Thunder Bolt'
        },
        e: {
            cooldown: 0,
            maxCooldown: 8000,
            manaCost: 25,
            heal: 30,
            name: 'Healing Light'
        }
    };

    // Timing
    let lastAttackTime = 0;
    let lastEnemyAttackTime = 0;

    // Damage numbers
    class DamageNumber {
        constructor(x, y, damage, isCrit = false) {
            this.x = x;
            this.y = y;
            this.damage = damage;
            this.life = 1;
            this.isCrit = isCrit;
        }

        update(deltaTime) {
            this.life -= deltaTime * 2;
            this.y -= deltaTime * 50;
            return this.life > 0;
        }

        draw() {
            if (this.life <= 0) return;
            ctx.save();
            ctx.font = `bold ${this.isCrit ? 24 : 18}px Arial`;
            ctx.fillStyle = this.isCrit ? '#ffaa00' : '#ff4444';
            ctx.shadowBlur = 0;
            ctx.globalAlpha = this.life;
            ctx.fillText(Math.floor(this.damage), this.x, this.y);
            ctx.restore();
        }
    }

    // Helper functions
    function distance(obj1, obj2) {
        const dx = obj1.x + obj1.width/2 - (obj2.x + obj2.width/2);
        const dy = obj1.y + obj1.height/2 - (obj2.y + obj2.height/2);
        return Math.sqrt(dx*dx + dy*dy);
    }

    function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    function addDamageNumber(x, y, damage, isCrit = false) {
        particles.push(new DamageNumber(x, y, damage, isCrit));
    }

    function getClosestEnemy() {
        let closest = enemy;
        let minDist = distance(player, enemy);
        for (let m of minions) {
            let d = distance(player, m);
            if (d < minDist) {
                minDist = d;
                closest = m;
            }
        }
        return closest;
    }

    function getDiffMult() {
        const d = gameSettings.difficulty;
        if (d === 'easy') return 0.6;
        if (d === 'hard') return 1.5;
        return 1;
    }

    function spawnWave() {
        wave++;
        minions = [];
        const count = 2 + wave;
        const mult = getDiffMult();
        for (let i = 0; i < count; i++) {
            const m = {
                id: Date.now() + Math.random(),
                x: 900 + Math.random() * 250,
                y: 50 + Math.random() * 500,
                width: 30,
                height: 30,
                health: Math.round((30 + wave * 8) * mult),
                maxHealth: Math.round((30 + wave * 8) * mult),
                attackDamage: Math.round((5 + wave * 2) * mult),
                attackRange: 60,
                attackCooldown: 1,
                attackSpeed: 0.8 * mult,
                moveSpeed: Math.round((140 + wave * 8) * mult),
                color: '#cc44cc'
            };
            minions.push(m);
        }
    }

    // Attack logic
    function playerAttack(target) {
        const now = Date.now() / 1000;
        if (now - lastAttackTime < 1 / player.attackSpeed) return false;
        
        const dist = distance(player, target);
        if (dist <= player.attackRange) {
            const damage = player.attackDamage + Math.floor(Math.random() * 5);
            target.health -= damage;
            addDamageNumber(target.x + target.width/2, target.y, damage, Math.random() > 0.8);
            lastAttackTime = now;
            
            if (target.health <= 0) {
                if (target === enemy) {
                    enemyRespawn();
                    score++;
                } else {
                    const idx = minions.indexOf(target);
                    if (idx !== -1) minions.splice(idx, 1);
                    score++;
                }
            }
            return true;
        }
        return false;
    }

    function enemyAttack() {
        const now = Date.now() / 1000;
        if (now - lastEnemyAttackTime < 1 / enemy.attackSpeed) return;
        
        const dist = distance(enemy, player);
        if (dist <= enemy.attackRange && player.health > 0) {
            const damage = enemy.attackDamage + Math.floor(Math.random() * 5);
            player.health -= damage;
            addDamageNumber(player.x + player.width/2, player.y, damage);
            lastEnemyAttackTime = now;
            
            if (player.health <= 0) {
                gameOver();
            }
        }
    }

    function useSkill(skillName) {
        const skill = skills[skillName];
        if (skill.cooldown > 0) return false;
        if (player.mana < skill.manaCost) return false;
        
        const dist = distance(player, enemy);
        
        switch(skillName) {
            case 'q':
                if (dist <= 150) {
                    player.mana -= skill.manaCost;
                    const damage = skill.damage + Math.floor(Math.random() * 10);
                    enemy.health -= damage;
                    addDamageNumber(enemy.x + enemy.width/2, enemy.y, damage, true);
                    skill.cooldown = skill.maxCooldown;
                    
                    if (enemy.health <= 0) {
                        enemyRespawn();
                        score++;
                    }
                    return true;
                }
                break;
            case 'w':
                if (dist <= 200) {
                    player.mana -= skill.manaCost;
                    const damage = skill.damage + Math.floor(Math.random() * 15);
                    enemy.health -= damage;
                    addDamageNumber(enemy.x + enemy.width/2, enemy.y, damage, true);
                    skill.cooldown = skill.maxCooldown;
                    
                    if (enemy.health <= 0) {
                        enemyRespawn();
                        score++;
                    }
                    return true;
                }
                break;
            case 'e':
                player.mana -= skill.manaCost;
                const healAmount = skill.heal + Math.floor(Math.random() * 10);
                player.health = Math.min(player.maxHealth, player.health + healAmount);
                addDamageNumber(player.x + player.width/2, player.y - 20, healAmount, false);
                skill.cooldown = skill.maxCooldown;
                return true;
        }
        return false;
    }

    function enemyRespawn() {
        enemy.health = enemy.maxHealth;
        enemy.x = 1000 + Math.random() * 100;
        enemy.y = 100 + Math.random() * 400;
        enemy.x = clamp(enemy.x, 800, 1150);
        enemy.y = clamp(enemy.y, 50, 550);
    }

    function gameOver() {
        gameRunning = false;
        alert(`Game Over! Your score: ${score}\nClick OK to restart`);
        resetGame();
    }

    function applyDifficulty() {
        const mult = getDiffMult();
        enemy.maxHealth = Math.round(100 * mult);
        enemy.health = enemy.maxHealth;
        enemy.attackDamage = Math.round(12 * mult);
        enemy.moveSpeed = Math.round(250 * mult);
        enemy.attackSpeed = 0.5 * mult;
    }

    function resetGame() {
        player.health = player.maxHealth;
        player.mana = player.maxMana;
        player.x = 200;
        player.y = 300;
        applyDifficulty();
        enemy.x = 1000;
        enemy.y = 300;
        score = 0;
        wave = 0;
        minions = [];
        waveCountdown = 0;
        gameRunning = true;
        skills.q.cooldown = 0;
        skills.w.cooldown = 0;
        skills.e.cooldown = 0;
        lastAttackTime = 0;
        lastEnemyAttackTime = 0;
    }

    // Movement and AI
    function updateMovement(deltaTime) {
        // Player movement
        if (player.targetX !== null && player.targetY !== null) {
            const dx = player.targetX - (player.x + player.width/2);
            const dy = player.targetY - (player.y + player.height/2);
            const distance = Math.sqrt(dx*dx + dy*dy);
            
            if (distance > 5) {
                const move = player.moveSpeed * deltaTime;
                const ratio = move / distance;
                player.x += dx * ratio;
                player.y += dy * ratio;
                
                // Keep player in bounds
                player.x = clamp(player.x, 0, canvas.width - player.width);
                player.y = clamp(player.y, 0, canvas.height - player.height);
            } else {
                player.targetX = null;
                player.targetY = null;
            }
        }
        
        // Enemy AI - chase player
        const dx = player.x + player.width/2 - (enemy.x + enemy.width/2);
        const dy = player.y + player.height/2 - (enemy.y + enemy.height/2);
        const distToPlayer = Math.sqrt(dx*dx + dy*dy);
        
        if (distToPlayer > enemy.attackRange - 20) {
            const move = enemy.moveSpeed * deltaTime;
            const ratio = move / distToPlayer;
            enemy.x += dx * ratio;
            enemy.y += dy * ratio;
            
            // Keep enemy in bounds
            enemy.x = clamp(enemy.x, 0, canvas.width - enemy.width);
            enemy.y = clamp(enemy.y, 0, canvas.height - enemy.height);
        }
    }

    function updateMinions(deltaTime) {
        for (let m of minions) {
            const dx = player.x + player.width/2 - (m.x + m.width/2);
            const dy = player.y + player.height/2 - (m.y + m.height/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > m.attackRange - 10) {
                const move = m.moveSpeed * deltaTime;
                const ratio = move / dist;
                m.x += dx * ratio;
                m.y += dy * ratio;
            }
            
            m.x = clamp(m.x, 0, canvas.width - m.width);
            m.y = clamp(m.y, 0, canvas.height - m.height);
            
            // Attack player
            m.attackCooldown -= deltaTime;
            if (dist <= m.attackRange && m.attackCooldown <= 0) {
                const dmg = m.attackDamage + Math.floor(Math.random() * 3);
                player.health -= dmg;
                addDamageNumber(player.x + player.width/2, player.y, dmg);
                m.attackCooldown = 1 / m.attackSpeed;
                if (player.health <= 0) gameOver();
            }
        }
    }

    // Drawing functions
    function drawHero(x, y, width, height, color, isPlayer = true) {
        // Shadow
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        
        // Body
        ctx.fillStyle = color;
        ctx.fillRect(x, y, width, height);
        
        // Border
        ctx.strokeStyle = isPlayer ? '#ffd700' : '#ff6600';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, width, height);
        
        // Face/eyes
        ctx.fillStyle = 'white';
        ctx.fillRect(x + width*0.2, y + height*0.3, width*0.15, height*0.15);
        ctx.fillRect(x + width*0.65, y + height*0.3, width*0.15, height*0.15);
        ctx.fillStyle = 'black';
        ctx.fillRect(x + width*0.22, y + height*0.32, width*0.1, height*0.1);
        ctx.fillRect(x + width*0.67, y + height*0.32, width*0.1, height*0.1);
        
        // Sword for player
        if (isPlayer) {
            ctx.fillStyle = '#cccccc';
            ctx.fillRect(x + width - 10, y + height/2 - 5, 15, 10);
        }
        
        ctx.shadowBlur = 0;
    }

    function drawMinimap() {
        const mmW = 200;
        const mmH = 110;
        const mmX = canvas.width - mmW - 15;
        const mmY = 15;
        const mmZoom = 2;
        const scaleX = mmW / (canvas.width * mmZoom);
        const scaleY = mmH / (canvas.height * mmZoom);

        // Background
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(mmX, mmY, mmW, mmH);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(mmX, mmY, mmW, mmH);

        // Center offset to keep player in middle
        const centerOffX = mmW / 2 - (player.x + player.width / 2) * scaleX;
        const centerOffY = mmH / 2 - (player.y + player.height / 2) * scaleY;

        function mmXform(gx, gy) {
            return { x: mmX + gx * scaleX + centerOffX, y: mmY + gy * scaleY + centerOffY };
        }

        // Draw grid lines on minimap
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < canvas.width * mmZoom; i += 150) {
            const sx = mmX + i * scaleX + centerOffX;
            ctx.beginPath();
            ctx.moveTo(sx, mmY);
            ctx.lineTo(sx, mmY + mmH);
            ctx.stroke();
        }
        for (let i = 0; i < canvas.height * mmZoom; i += 150) {
            const sy = mmY + i * scaleY + centerOffY;
            ctx.beginPath();
            ctx.moveTo(mmX, sy);
            ctx.lineTo(mmX + mmW, sy);
            ctx.stroke();
        }

        // Player dot (centered)
        let p = mmXform(player.x + player.width/2, player.y + player.height/2);
        ctx.fillStyle = '#4a90e2';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Enemy dot
        let e = mmXform(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
        ctx.fillStyle = '#e24a4a';
        ctx.beginPath();
        ctx.arc(e.x, e.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ff6600';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Minion dots
        for (let m of minions) {
            let pt = mmXform(m.x + m.width/2, m.y + m.height/2);
            ctx.fillStyle = '#cc44cc';
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // Label
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '11px Arial';
        ctx.fillText('MINIMAP', mmX + 4, mmY + 12);
    }

    function drawUI() {
        const pad = 15;
        const barW = 200;
        const barH = 14;

        // --- Player HP ---
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(pad, pad, barW, barH + 16);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(pad + 1, pad + 15, (barW - 2) * (player.health / player.maxHealth), barH);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        ctx.strokeRect(pad, pad, barW, barH + 16);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 11px Arial';
        ctx.fillText(`HP: ${Math.ceil(player.health)}/${player.maxHealth}`, pad + 4, pad + 12);

        // --- Mana ---
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(pad, pad + 34, barW, barH + 4);
        ctx.fillStyle = '#4488ff';
        ctx.fillRect(pad + 1, pad + 35, (barW - 2) * (player.mana / player.maxMana), barH - 2);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        ctx.strokeRect(pad, pad + 34, barW, barH + 4);
        ctx.fillStyle = '#aaccff';
        ctx.font = '10px Arial';
        ctx.fillText(`MANA: ${Math.ceil(player.mana)}/${player.maxMana}`, pad + 4, pad + 46);

        // --- Enemy HP (top right) ---
        const eBarX = canvas.width - barW - pad;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(eBarX, pad, barW, barH + 4);
        ctx.fillStyle = '#ff8888';
        ctx.fillRect(eBarX + 1, pad + 1, (barW - 2) * (enemy.health / enemy.maxHealth), barH - 2);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        ctx.strokeRect(eBarX, pad, barW, barH + 4);
        ctx.fillStyle = '#ffaaaa';
        ctx.font = 'bold 11px Arial';
        ctx.fillText(`ENEMY`, eBarX + 4, pad + 12);

        // --- Wave / Score (top center) ---
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        const infoW = 220;
        const infoX = (canvas.width - infoW) / 2;
        ctx.fillRect(infoX, pad, infoW, 28);
        ctx.strokeStyle = '#555';
        ctx.strokeRect(infoX, pad, infoW, 28);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`Wave ${wave}  |  Score: ${score}`, canvas.width / 2, pad + 21);
        ctx.textAlign = 'left';

        // Edit mode indicator
        if (editMode) {
            ctx.fillStyle = 'rgba(0,255,136,0.8)';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('✦ EDIT MODE — Drag skill buttons to reposition', canvas.width / 2, canvas.height - 10);
            ctx.textAlign = 'left';
        }
    }

    function draw() {
        // Clear canvas with gradient background
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#2d5a3b');
        gradient.addColorStop(1, '#1a3622');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw grid (minimap style)
        ctx.strokeStyle = '#4a7a5a';
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 50) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(canvas.width, i);
            ctx.stroke();
        }
        
        // Draw movement target indicator
        if (player.targetX !== null && player.targetY !== null) {
            ctx.beginPath();
            ctx.arc(player.targetX, player.targetY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.targetX, player.targetY, 8, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
            ctx.fill();
        }
        
        // Draw heroes
        drawHero(player.x, player.y, player.width, player.height, player.color, true);
        drawHero(enemy.x, enemy.y, enemy.width, enemy.height, enemy.color, false);
        
        // Draw minions
        for (let m of minions) {
            ctx.fillStyle = m.color;
            ctx.fillRect(m.x, m.y, m.width, m.height);
            ctx.strokeStyle = '#880088';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(m.x, m.y, m.width, m.height);
            // Minion health bar
            const hpPct = m.health / m.maxHealth;
            ctx.fillStyle = '#333';
            ctx.fillRect(m.x, m.y - 6, m.width, 4);
            ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
            ctx.fillRect(m.x, m.y - 6, m.width * hpPct, 4);
        }
        
        // Draw attack range indicator when close
        const distToEnemy = distance(player, enemy);
        if (gameSettings.showRange && distToEnemy <= player.attackRange + 50) {
            ctx.beginPath();
            ctx.arc(player.x + player.width/2, player.y + player.height/2, player.attackRange, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(74, 144, 226, 0.1)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(74, 144, 226, 0.5)';
            ctx.stroke();
        }
        
        // Draw damage numbers
        particles = particles.filter(p => p.update(1/60));
        particles.forEach(p => p.draw());
        
        drawMinimap();
        drawUI();
    }

    // Main game loop
    let lastTime = Date.now() / 1000;
    
    function gameLoop() {
        if (!gameRunning) return;
        
        const now = Date.now() / 1000;
        let deltaTime = Math.min(0.033, now - lastTime);
        lastTime = now;
        
        updateMovement(deltaTime);
        updateMinions(deltaTime);
        
        // Mana regen
        player.mana = Math.min(player.maxMana, player.mana + player.manaRegen * deltaTime);
        
        // Wave management
        if (minions.length === 0 && waveCountdown <= 0) {
            waveCountdown = waveDelay;
        }
        if (waveCountdown > 0) {
            waveCountdown -= deltaTime * 1000;
            if (waveCountdown <= 0) {
                spawnWave();
            }
        }
        
        // Auto-attack logic - target closest enemy
        const closest = getClosestEnemy();
        if (distance(player, closest) <= player.attackRange) {
            playerAttack(closest);
        }
        enemyAttack();
        
        for (let key of skillKeys) {
            if (skills[key].cooldown > 0) {
                skills[key].cooldown -= deltaTime * 1000;
                if (skills[key].cooldown < 0) skills[key].cooldown = 0;
            }
        }
        
        updateSkillUI();
        draw();
        
        requestAnimationFrame(gameLoop);
    }
    
    function updateSkillUI() {
        for (let key of skillKeys) {
            const s = skills[key];
            const el = document.getElementById(`skill${key.toUpperCase()}`);
            const cdEl = document.getElementById(`cd-${key}`);
            const onCooldown = s.cooldown > 0;
            const noMana = player.mana < s.manaCost;
            
            el.classList.toggle('on-cooldown', onCooldown);
            el.classList.toggle('no-mana', !onCooldown && noMana);
            el.classList.toggle('disabled', onCooldown || noMana);
            
            if (onCooldown) {
                cdEl.textContent = `${(s.cooldown / 1000).toFixed(1)}s`;
            }
        }
    }

    // Event listeners
    canvas.addEventListener('click', (e) => {
        if (!gameRunning || !gameStarted) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const canvasX = (e.clientX - rect.left) * scaleX;
        const canvasY = (e.clientY - rect.top) * scaleY;
        
        player.targetX = canvasX;
        player.targetY = canvasY;
    });
    
    // Settings
    document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('settingsOverlay').classList.add('open');
    });
    document.getElementById('settingsClose').addEventListener('click', () => {
        document.getElementById('settingsOverlay').classList.remove('open');
    });
    document.querySelectorAll('#diffGroup .toggle-opt').forEach(el => {
        el.addEventListener('click', () => {
            document.querySelectorAll('#diffGroup .toggle-opt').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            gameSettings.difficulty = el.dataset.value;
            applyDifficulty();
        });
    });
    document.getElementById('rangeToggle').addEventListener('click', function() {
        gameSettings.showRange = !gameSettings.showRange;
        this.textContent = gameSettings.showRange ? 'Show' : 'Hide';
    });
    
    // --- Drag-and-drop Custom HUD ---
    let editMode = false;
    let dragTarget = null;
    let dragOffX = 0, dragOffY = 0;
    let didDrag = false;
    const skillPanel = document.getElementById('skillPanel');

    function refreshPanelCustom() {
        const has = Array.from(document.querySelectorAll('.skill-btn')).some(el => el.dataset.customPos);
        skillPanel.classList.toggle('has-custom', has);
    }

    function loadLayout() {
        const ver = localStorage.getItem('mobaLayoutVer');
        if (ver !== '2') {
            localStorage.removeItem('mobaSkillLayout');
            localStorage.setItem('mobaLayoutVer', '2');
        }
        const saved = localStorage.getItem('mobaSkillLayout');
        if (saved) {
            const pos = JSON.parse(saved);
            for (let key of skillKeys) {
                if (pos[key]) {
                    const el = document.getElementById(`skill${key.toUpperCase()}`);
                    el.style.left = pos[key].left + 'px';
                    el.style.top = pos[key].top + 'px';
                    el.dataset.customPos = 'true';
                }
            }
        }
        refreshPanelCustom();
    }

    function saveLayout() {
        const pos = {};
        for (let key of skillKeys) {
            const el = document.getElementById(`skill${key.toUpperCase()}`);
            if (el.dataset.customPos) {
                pos[key] = { left: parseInt(el.style.left), top: parseInt(el.style.top) };
            }
        }
        localStorage.setItem('mobaSkillLayout', JSON.stringify(pos));
        refreshPanelCustom();
    }

    function resetLayout() {
        localStorage.removeItem('mobaSkillLayout');
        for (let key of skillKeys) {
            const el = document.getElementById(`skill${key.toUpperCase()}`);
            el.style.left = '';
            el.style.top = '';
            delete el.dataset.customPos;
        }
        refreshPanelCustom();
    }

    function setEditMode(on) {
        editMode = on;
        document.body.classList.toggle('edit-mode', on);
        document.getElementById('editModeToggle').textContent = on ? 'On' : 'Off';
        document.getElementById('editModeActions').style.display = on ? 'block' : 'none';

        if (on) {
            for (let key of skillKeys) {
                const el = document.getElementById(`skill${key.toUpperCase()}`);
                if (!el.dataset.customPos) {
                    const rect = el.getBoundingClientRect();
                    el.style.left = rect.left + 'px';
                    el.style.top = rect.top + 'px';
                }
            }
        } else {
            for (let key of skillKeys) {
                const el = document.getElementById(`skill${key.toUpperCase()}`);
                if (!el.dataset.customPos) {
                    el.style.left = '';
                    el.style.top = '';
                }
            }
        }
        refreshPanelCustom();
    }

    document.getElementById('editModeToggle').addEventListener('click', () => {
        setEditMode(!editMode);
    });

    document.getElementById('saveLayoutBtn').addEventListener('click', () => {
        saveLayout();
        setEditMode(false);
    });

    document.getElementById('resetLayoutBtn').addEventListener('click', () => {
        resetLayout();
        setEditMode(false);
    });

    document.addEventListener('mousedown', (e) => {
        if (!editMode) return;
        const btn = e.target.closest('.skill-btn');
        if (!btn) return;
        e.preventDefault();
        dragTarget = btn;
        dragTarget.classList.add('dragging');
        const rect = btn.getBoundingClientRect();
        dragOffX = e.clientX - rect.left;
        dragOffY = e.clientY - rect.top;
    });

    document.addEventListener('mousemove', (e) => {
        if (!dragTarget) return;
        e.preventDefault();
        didDrag = true;
        const left = e.clientX - dragOffX;
        const top = e.clientY - dragOffY;
        dragTarget.style.left = left + 'px';
        dragTarget.style.top = top + 'px';
        dragTarget.dataset.customPos = 'true';
        refreshPanelCustom();
    });

    document.addEventListener('mouseup', () => {
        if (dragTarget) dragTarget.classList.remove('dragging');
        dragTarget = null;
    });

    for (let key of skillKeys) {
        const el = document.getElementById(`skill${key.toUpperCase()}`);
        el.addEventListener('click', (e) => {
            if (!gameStarted || editMode || didDrag) { didDrag = false; return; }
            useSkill(key);
        });
    }
    
    loadLayout();
    resetGame();

    // Start screen
    let gameStarted = false;

    function drawStartScreen() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#1a3622');
        gradient.addColorStop(1, '#0e1f14');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 56px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('MOBA ARENA', canvas.width / 2, canvas.height / 2 - 80);

        ctx.fillStyle = '#aaa';
        ctx.font = '18px Arial';
        ctx.fillText('Wave-based combat arena', canvas.width / 2, canvas.height / 2 - 30);

        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 28px Arial';
        ctx.fillText('▶  PLAY', canvas.width / 2, canvas.height / 2 + 60);

        ctx.fillStyle = '#ffd700';
        ctx.fillRect(canvas.width / 2 - 70, canvas.height / 2 + 75, 140, 3);

        ctx.fillStyle = '#888';
        ctx.font = '13px Arial';
        ctx.fillText('Click anywhere to start', canvas.width / 2, canvas.height / 2 + 120);
        ctx.textAlign = 'left';
    }

    drawStartScreen();

    canvas.addEventListener('click', function startHandler() {
        if (gameStarted) return;
        gameStarted = true;
        canvas.removeEventListener('click', startHandler);
        gameLoop();
    });
</script>
</body>
</html>
