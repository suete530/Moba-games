
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOBA Game Prototype</title>
<style>
    * {
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Arial', 'Segoe UI', sans-serif;
    }

    .game-container {
        background: #2c2c2c;
        padding: 10px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    canvas {
        display: block;
        margin: 0 auto;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        cursor: crosshair;
    }

    @keyframes damage {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-30px); }
    }

    .damage-number {
        position: absolute;
        color: red;
        font-weight: bold;
        font-size: 20px;
        pointer-events: none;
        animation: damage 0.5s ease-out forwards;
    }
</style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1200" height="600"></canvas>
    </div>
</div>

<div class="settings-btn" id="settingsBtn">⚙️</div>

<div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
        <div class="settings-header">SETTINGS</div>
        
        <div class="setting-row">
            <span>Difficulty</span>
            <div class="toggle-group" id="diffGroup">
                <span class="toggle-opt" data-value="easy">Easy</span>
                <span class="toggle-opt active" data-value="normal">Normal</span>
                <span class="toggle-opt" data-value="hard">Hard</span>
            </div>
        </div>

        <div class="setting-row">
            <span>Attack Range</span>
            <span class="toggle-opt" data-value="showRange" id="rangeToggle">Show</span>
        </div>

        <div class="setting-row">
            <span>Controls</span>
            <span style="color:#aaa;font-size:13px;">Click to move | Q W E = Skills</span>
        </div>

        <div class="setting-row">
            <span>Edit Mode (drag skills)</span>
            <span class="toggle-opt" id="editModeToggle">Off</span>
        </div>

        <div id="editModeActions" style="display:none;margin-top:10px;">
            <div style="display:flex;gap:10px;">
                <span class="toggle-opt" id="saveLayoutBtn" style="flex:1;text-align:center;background:#2d7a2d;color:#fff;">Save Layout</span>
                <span class="toggle-opt" id="resetLayoutBtn" style="flex:1;text-align:center;background:#7a2d2d;color:#fff;">Reset</span>
            </div>
            <div style="color:#888;font-size:12px;margin-top:8px;text-align:center;">Drag the skill circles to reposition</div>
        </div>

        <div class="settings-close" id="settingsClose">Close</div>
    </div>
</div>

<div class="joystick-zone" id="joystickZone">
    <div class="joystick-base" id="joystickBase">
        <div class="joystick-thumb" id="joystickThumb"></div>
    </div>
</div>

<div class="skill-panel" id="skillPanel">
    <div class="skill-btn" data-skill="q" id="skillQ">
        <div class="skill-circle">
            <span class="skill-key">Q</span>
            <span class="skill-cd" id="cd-q"></span>
        </div>
        <span class="skill-mp">20</span>
    </div>
    <div class="skill-btn" data-skill="w" id="skillW">
        <div class="skill-circle">
            <span class="skill-key">W</span>
            <span class="skill-cd" id="cd-w"></span>
        </div>
        <span class="skill-mp">35</span>
    </div>
    <div class="skill-btn" data-skill="e" id="skillE">
        <div class="skill-circle">
            <span class="skill-key">E</span>
            <span class="skill-cd" id="cd-e"></span>
        </div>
        <span class="skill-mp">25</span>
    </div>
</div>

</style>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const skillKeys = ['q', 'w', 'e'];

    let gameSettings = {
        difficulty: 'normal',
        showRange: true
    };

    // Game state
    let score = 0;
    let gameRunning = true;
    let particles = [];
    let projectiles = [];
    let wave = 0;
    let minions = [];
    let waveCountdown = 0;
    let waveDelay = 3000;

    // Player
    const player = {
        x: 200,
        y: 300,
        width: 40,
        height: 40,
        health: 100,
        maxHealth: 100,
        mana: 100,
        maxMana: 100,
        manaRegen: 10,
        attackDamage: 15,
        attackRange: 100,
        attackSpeed: 0.6,
        moveSpeed: 300,
        targetX: null,
        targetY: null,
        color: '#4a90e2'
    };

    // Enemy AI
    const enemy = {
        x: 1000,
        y: 300,
        width: 40,
        height: 40,
        health: 100,
        maxHealth: 100,
        attackDamage: 12,
        attackRange: 100,
        attackSpeed: 0.5,
        moveSpeed: 250,
        color: '#e24a4a'
    };

    // Skill system
    const skills = {
        q: {
            cooldown: 0,
            maxCooldown: 3000, // milliseconds
            manaCost: 20,
            damage: 30,
            name: 'Fire Strike'
        },
        w: {
            cooldown: 0,
            maxCooldown: 5000,
            manaCost: 35,
            damage: 45,
            name: 'Thunder Bolt'
        },
        e: {
            cooldown: 0,
            maxCooldown: 8000,
            manaCost: 25,
            heal: 30,
            name: 'Healing Light'
        }
    };

    // Timing
    let lastAttackTime = 0;
    let lastEnemyAttackTime = 0;

    // Damage numbers
    class DamageNumber {
        constructor(x, y, damage, isCrit = false) {
            this.x = x;
            this.y = y;
            this.damage = damage;
            this.life = 1;
            this.isCrit = isCrit;
        }

        update(deltaTime) {
            this.life -= deltaTime * 2;
            this.y -= deltaTime * 50;
            return this.life > 0;
        }

        draw() {
            if (this.life <= 0) return;
            ctx.globalAlpha = this.life;
            ctx.font = `bold ${this.isCrit ? 26 : 20}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillStyle = this.isCrit ? '#ffdd00' : '#ff4444';
            ctx.fillText(Math.floor(this.damage), this.x, this.y);
            ctx.textAlign = 'left';
            ctx.globalAlpha = 1;
        }
    }

    class SlashEffect {
        constructor(x, y, color, isPlayer) {
            this.x = x;
            this.y = y;
            this.life = 1;
            this.angle = Math.random() * Math.PI * 2;
            this.len = 15 + Math.random() * 10;
            this.color = color;
        }

        update(deltaTime) {
            this.life -= deltaTime * 3;
            return this.life > 0;
        }

        draw() {
            if (this.life <= 0) return;
            ctx.globalAlpha = this.life * 0.8;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + Math.cos(this.angle) * this.len, this.y + Math.sin(this.angle) * this.len);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
    }

    // Helper functions
    function distance(obj1, obj2) {
        const dx = obj1.x + obj1.width/2 - (obj2.x + obj2.width/2);
        const dy = obj1.y + obj1.height/2 - (obj2.y + obj2.height/2);
        return Math.sqrt(dx*dx + dy*dy);
    }

    function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    function addDamageNumber(x, y, damage, isCrit = false) {
        particles.push(new DamageNumber(x, y, damage, isCrit));
    }

    function addSlash(x, y, color, isPlayer) {
        for (let i = 0; i < 3; i++) {
            particles.push(new SlashEffect(x, y, color, isPlayer));
        }
    }

    class SkillBurst {
        constructor(x, y, color, count) {
            this.particles = [];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 60 + Math.random() * 100;
                this.particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.5 + Math.random() * 0.5,
                    size: 3 + Math.random() * 5,
                    color
                });
            }
        }

        update(dt) {
            let alive = false;
            for (let p of this.particles) {
                p.life -= dt * 2;
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vx *= 0.95;
                p.vy *= 0.95;
                if (p.life > 0) alive = true;
            }
            return alive;
        }

        draw() {
            for (let p of this.particles) {
                if (p.life <= 0) continue;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
    }

    class Projectile {
        constructor(fromX, fromY, toX, toY, color, size, speed, damage, onHit) {
            this.x = fromX;
            this.y = fromY;
            const dx = toX - fromX;
            const dy = toY - fromY;
            const len = Math.sqrt(dx * dx + dy * dy);
            this.vx = (dx / len) * speed;
            this.vy = (dy / len) * speed;
            this.color = color;
            this.size = size;
            this.damage = damage;
            this.onHit = onHit;
            this.distTraveled = 0;
            this.maxDist = len;
            this.life = 1;
            this.trail = [];
        }

        update(dt) {
            this.trail.push({ x: this.x, y: this.y, life: 1 });
            if (this.trail.length > 5) this.trail.shift();
            for (let t of this.trail) t.life -= dt * 3;

            const step = Math.sqrt(this.vx * this.vx + this.vy * this.vy) * dt;
            this.distTraveled += step;
            this.x += this.vx * dt;
            this.y += this.vy * dt;

            if (this.distTraveled >= this.maxDist) {
                this.onHit();
                return false;
            }
            return true;
        }

        draw() {
            for (let t of this.trail) {
                if (t.life <= 0) continue;
                ctx.globalAlpha = t.life * 0.4;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(this.x - 2, this.y - 2, this.size * 0.4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function getClosestEnemy() {
        let closest = enemy;
        let minDist = distance(player, enemy);
        for (let m of minions) {
            let d = distance(player, m);
            if (d < minDist) {
                minDist = d;
                closest = m;
            }
        }
        return closest;
    }

    function getDiffMult() {
        const d = gameSettings.difficulty;
        if (d === 'easy') return 0.6;
        if (d === 'hard') return 1.5;
        return 1;
    }

    function spawnWave() {
        wave++;
        minions = [];
        const count = 2 + wave;
        const mult = getDiffMult();
        for (let i = 0; i < count; i++) {
            const m = {
                id: Date.now() + Math.random(),
                x: 900 + Math.random() * 250,
                y: 50 + Math.random() * 500,
                width: 30,
                height: 30,
                health: Math.round((30 + wave * 8) * mult),
                maxHealth: Math.round((30 + wave * 8) * mult),
                attackDamage: Math.round((5 + wave * 2) * mult),
                attackRange: 60,
                attackCooldown: 1,
                attackSpeed: 0.8 * mult,
                moveSpeed: Math.round((140 + wave * 8) * mult),
                color: '#cc44cc'
            };
            minions.push(m);
        }
    }

    // Attack logic
    function playerAttack(target) {
        const now = Date.now() / 1000;
        if (now - lastAttackTime < 1 / player.attackSpeed) return false;
        
        const dist = distance(player, target);
        if (dist <= player.attackRange) {
            const damage = player.attackDamage + Math.floor(Math.random() * 5);
            target.health -= damage;
            addDamageNumber(target.x + target.width/2, target.y, damage, Math.random() > 0.8);
            addSlash(target.x + target.width/2, target.y + target.height/2, '#ffd700', true);
            lastAttackTime = now;
            
            if (target.health <= 0) {
                if (target === enemy) {
                    enemyRespawn();
                    score++;
                } else {
                    const idx = minions.indexOf(target);
                    if (idx !== -1) minions.splice(idx, 1);
                    score++;
                }
            }
            return true;
        }
        return false;
    }

    function enemyAttack() {
        const now = Date.now() / 1000;
        if (now - lastEnemyAttackTime < 1 / enemy.attackSpeed) return;
        
        const dist = distance(enemy, player);
        if (dist <= enemy.attackRange && player.health > 0) {
            const damage = enemy.attackDamage + Math.floor(Math.random() * 5);
            player.health -= damage;
            addDamageNumber(player.x + player.width/2, player.y, damage);
            addSlash(player.x + player.width/2, player.y + player.height/2, '#ff4444', false);
            lastEnemyAttackTime = now;
            
            if (player.health <= 0) {
                gameOver();
            }
        }
    }

    function useSkill(skillName) {
        const skill = skills[skillName];
        if (skill.cooldown > 0) return false;
        if (player.mana < skill.manaCost) return false;
        
        const dist = distance(player, enemy);
        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        const ex = enemy.x + enemy.width / 2;
        const ey = enemy.y + enemy.height / 2;
        
        switch(skillName) {
            case 'q':
                if (dist <= 150) {
                    player.mana -= skill.manaCost;
                    skill.cooldown = skill.maxCooldown;
                    const damage = skill.damage + Math.floor(Math.random() * 10);
                    projectiles.push(new Projectile(px, py, ex, ey, '#ff6600', 6, 500, damage, () => {
                        enemy.health -= damage;
                        addDamageNumber(ex, ey, damage, true);
                        particles.push(new SkillBurst(ex, ey, '#ff6600', 12));
                        if (enemy.health <= 0) { enemyRespawn(); score++; }
                    }));
                    return true;
                }
                break;
            case 'w':
                if (dist <= 200) {
                    player.mana -= skill.manaCost;
                    skill.cooldown = skill.maxCooldown;
                    const damage = skill.damage + Math.floor(Math.random() * 15);
                    projectiles.push(new Projectile(px, py, ex, ey, '#4488ff', 8, 400, damage, () => {
                        enemy.health -= damage;
                        addDamageNumber(ex, ey, damage, true);
                        particles.push(new SkillBurst(ex, ey, '#4488ff', 16));
                        if (enemy.health <= 0) { enemyRespawn(); score++; }
                    }));
                    return true;
                }
                break;
            case 'e':
                player.mana -= skill.manaCost;
                skill.cooldown = skill.maxCooldown;
                const healAmount = skill.heal + Math.floor(Math.random() * 10);
                player.health = Math.min(player.maxHealth, player.health + healAmount);
                addDamageNumber(px, py - 20, healAmount, false);
                particles.push(new SkillBurst(px, py, '#44ff88', 10));
                return true;
        }
        return false;
    }

    function enemyRespawn() {
        enemy.health = enemy.maxHealth;
        enemy.x = 1000 + Math.random() * 100;
        enemy.y = 100 + Math.random() * 400;
        enemy.x = clamp(enemy.x, 800, 1150);
        enemy.y = clamp(enemy.y, 50, 550);
    }

    function gameOver() {
        gameRunning = false;
        alert(`Game Over! Your score: ${score}\nClick OK to restart`);
        resetGame();
    }

    function applyDifficulty() {
        const mult = getDiffMult();
        enemy.maxHealth = Math.round(100 * mult);
        enemy.health = enemy.maxHealth;
        enemy.attackDamage = Math.round(12 * mult);
        enemy.moveSpeed = Math.round(250 * mult);
        enemy.attackSpeed = 0.5 * mult;
    }

    function resetGame() {
        player.health = player.maxHealth;
        player.mana = player.maxMana;
        player.x = 200;
        player.y = 300;
        applyDifficulty();
        enemy.x = 1000;
        enemy.y = 300;
        score = 0;
        wave = 0;
        minions = [];
        projectiles = [];
        waveCountdown = 0;
        gameRunning = true;
        skills.q.cooldown = 0;
        skills.w.cooldown = 0;
        skills.e.cooldown = 0;
        lastAttackTime = 0;
        lastEnemyAttackTime = 0;
    }

    // Movement and AI
    function updateMovement(deltaTime) {
        // Joystick movement
        if (jActive && (jDx !== 0 || jDy !== 0)) {
            const norm = Math.sqrt(jDx * jDx + jDy * jDy);
            if (norm > 2) {
                const speed = player.moveSpeed * 1.1;
                player.x += (jDx / norm) * speed * deltaTime;
                player.y += (jDy / norm) * speed * deltaTime;
                player.x = clamp(player.x, 0, canvas.width - player.width);
                player.y = clamp(player.y, 0, canvas.height - player.height);
            }
        }

        // Mouse click movement
        if (player.targetX !== null && player.targetY !== null) {
            const dx = player.targetX - (player.x + player.width/2);
            const dy = player.targetY - (player.y + player.height/2);
            const distance = Math.sqrt(dx*dx + dy*dy);
            
            if (distance > 5) {
                const move = player.moveSpeed * deltaTime;
                const ratio = move / distance;
                player.x += dx * ratio;
                player.y += dy * ratio;
                
                // Keep player in bounds
                player.x = clamp(player.x, 0, canvas.width - player.width);
                player.y = clamp(player.y, 0, canvas.height - player.height);
            } else {
                player.targetX = null;
                player.targetY = null;
            }
        }
        
        // Enemy AI - chase player
        const dx = player.x + player.width/2 - (enemy.x + enemy.width/2);
        const dy = player.y + player.height/2 - (enemy.y + enemy.height/2);
        const distToPlayer = Math.sqrt(dx*dx + dy*dy);
        
        if (distToPlayer > enemy.attackRange - 20) {
            const move = enemy.moveSpeed * deltaTime;
            const ratio = move / distToPlayer;
            enemy.x += dx * ratio;
            enemy.y += dy * ratio;
            
            // Keep enemy in bounds
            enemy.x = clamp(enemy.x, 0, canvas.width - enemy.width);
            enemy.y = clamp(enemy.y, 0, canvas.height - enemy.height);
        }
    }

    function updateMinions(deltaTime) {
        for (let m of minions) {
            const dx = player.x + player.width/2 - (m.x + m.width/2);
            const dy = player.y + player.height/2 - (m.y + m.height/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > m.attackRange - 10) {
                const move = m.moveSpeed * deltaTime;
                const ratio = move / dist;
                m.x += dx * ratio;
                m.y += dy * ratio;
            }
            
            m.x = clamp(m.x, 0, canvas.width - m.width);
            m.y = clamp(m.y, 0, canvas.height - m.height);
            
            // Attack player
            m.attackCooldown -= deltaTime;
            if (dist <= m.attackRange && m.attackCooldown <= 0) {
                const dmg = m.attackDamage + Math.floor(Math.random() * 3);
                player.health -= dmg;
                addDamageNumber(player.x + player.width/2, player.y, dmg);
                m.attackCooldown = 1 / m.attackSpeed;
                if (player.health <= 0) gameOver();
            }
        }
    }

    // Drawing functions
    function drawHero(x, y, width, height, color, isPlayer = true) {
        const cx = x + width / 2;

        // Shadow under feet
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(cx, y + height + 2, width / 2, 6, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.fillStyle = color;
        ctx.fillRect(x + 2, y + 4, width - 4, height - 4);

        // Border
        ctx.strokeStyle = isPlayer ? '#ffd700' : '#ff6600';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 2, y + 4, width - 4, height - 4);

        // Face
        ctx.fillStyle = '#f0d5a0';
        ctx.fillRect(x + 8, y + 6, width - 16, 12);

        // Eyes
        ctx.fillStyle = '#222';
        ctx.fillRect(x + 12, y + 9, 4, 4);
        ctx.fillRect(x + width - 16, y + 9, 4, 4);

        // Weapon
        const wx = isPlayer ? x + width - 6 : x - 4;
        ctx.fillStyle = isPlayer ? '#ffd700' : '#ff6600';
        ctx.fillRect(wx, y + height / 2 - 6, 14, 5);

        // Legs
        ctx.fillStyle = isPlayer ? '#1a3a5a' : '#5a1a1a';
        ctx.fillRect(x + 6, y + height - 3, 8, 5);
        ctx.fillRect(x + width - 14, y + height - 3, 8, 5);
    }

    function drawMinimap() {
        const mmW = 200;
        const mmH = 110;
        const mmX = canvas.width - mmW - 15;
        const mmY = 15;
        const mmZoom = 2;
        const scaleX = mmW / (canvas.width * mmZoom);
        const scaleY = mmH / (canvas.height * mmZoom);

        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(mmX, mmY, mmW, mmH);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(mmX, mmY, mmW, mmH);

        const cx = player.x + player.width / 2;
        const cy = player.y + player.height / 2;
        const offX = mmW / 2 - cx * scaleX;
        const offY = mmH / 2 - cy * scaleY;

        const mx = (gx) => mmX + gx * scaleX + offX;
        const my = (gy) => mmY + gy * scaleY + offY;

        const p = { x: mx(cx), y: my(cy) };
        ctx.fillStyle = '#4a90e2';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        const e = { x: mx(enemy.x + enemy.width/2), y: my(enemy.y + enemy.height/2) };
        ctx.fillStyle = '#e24a4a';
        ctx.beginPath();
        ctx.arc(e.x, e.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ff6600';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        for (let m of minions) {
            const dx = mx(m.x + m.width/2);
            const dy = my(m.y + m.height/2);
            ctx.fillStyle = '#cc44cc';
            ctx.beginPath();
            ctx.arc(dx, dy, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '11px Arial';
        ctx.fillText('MINIMAP', mmX + 4, mmY + 12);
    }

    function drawUI() {
        const pad = 15;
        const barW = 200;
        const barH = 14;

        // --- Player HP ---
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(pad, pad, barW, barH + 18);
        const hpRatio = player.health / player.maxHealth;
        ctx.fillStyle = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#cccc44' : '#cc4444';
        ctx.fillRect(pad + 2, pad + 16, (barW - 4) * hpRatio, barH - 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.strokeRect(pad, pad, barW, barH + 18);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(`HP: ${Math.ceil(player.health)}/${player.maxHealth}`, pad + 6, pad + 13);

        // --- Mana ---
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(pad, pad + 34, barW, barH + 6);
        const manaRatio = player.mana / player.maxMana;
        ctx.fillStyle = '#4488ff';
        ctx.fillRect(pad + 2, pad + 36, (barW - 4) * manaRatio, barH - 2);
        ctx.fillStyle = '#aaccff';
        ctx.font = '10px Arial';
        ctx.fillText(`MANA: ${Math.ceil(player.mana)}/${player.maxMana}`, pad + 6, pad + 47);

        // --- Enemy HP (top right) ---
        const eBarX = canvas.width - barW - pad;
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(eBarX, pad, barW, barH + 6);
        const eRatio = enemy.health / enemy.maxHealth;
        ctx.fillStyle = '#ff5555';
        ctx.fillRect(eBarX + 2, pad + 2, (barW - 4) * eRatio, barH - 2);
        ctx.fillStyle = '#ffcccc';
        ctx.font = 'bold 12px Arial';
        ctx.fillText('ENEMY', eBarX + 6, pad + 12);

        // --- Wave / Score (top center) ---
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        const infoW = 240;
        const infoX = (canvas.width - infoW) / 2;
        ctx.fillRect(infoX, pad, infoW, 30);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 17px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`Wave ${wave}  |  Score: ${score}`, canvas.width / 2, pad + 22);
        ctx.textAlign = 'left';

        if (editMode) {
            ctx.fillStyle = 'rgba(0,255,136,0.8)';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('EDIT MODE - Drag skill buttons to reposition', canvas.width / 2, canvas.height - 10);
            ctx.textAlign = 'left';
        }
    }

    function draw() {
        // Background - solid fill (no gradient per frame)
        ctx.fillStyle = '#1e3d28';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid lines (sparse)
        ctx.strokeStyle = 'rgba(74,122,90,0.15)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < canvas.width; i += 100) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(canvas.width, i);
            ctx.stroke();
        }

        // Center lane
        ctx.strokeStyle = 'rgba(100,160,100,0.1)';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 20]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);

        // Static bushes (left/right edges)
        ctx.fillStyle = 'rgba(30,60,30,0.2)';
        ctx.beginPath();
        ctx.ellipse(40, 60, 30, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(1160, 540, 30, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(50, 520, 25, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(1150, 80, 25, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw movement target indicator
        if (player.targetX !== null && player.targetY !== null) {
            ctx.beginPath();
            ctx.arc(player.targetX, player.targetY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.targetX, player.targetY, 8, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
            ctx.fill();
        }
        
        // Draw heroes
        drawHero(player.x, player.y, player.width, player.height, player.color, true);
        drawHero(enemy.x, enemy.y, enemy.width, enemy.height, enemy.color, false);
        
        // Draw minions
        for (let m of minions) {
            const mx = m.x, my = m.y, mw = m.width, mh = m.height;
            const mc = mx + mw / 2;

            // Body
            ctx.fillStyle = '#993399';
            ctx.fillRect(mx, my, mw, mh);

            // Border
            ctx.strokeStyle = '#aa44aa';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(mx, my, mw, mh);

            // Eyes
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(mc - 5, my + 10, 3, 0, Math.PI * 2);
            ctx.arc(mc + 5, my + 10, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(mc - 5, my + 10, 1.5, 0, Math.PI * 2);
            ctx.arc(mc + 5, my + 10, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Health bar
            const hpPct = m.health / m.maxHealth;
            const hbW = mw + 4;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(mx - 2, my - 8, hbW, 5);
            ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
            ctx.fillRect(mx - 2, my - 8, hbW * hpPct, 5);
        }
        
        // Draw attack range indicator when close
        const distToEnemy = distance(player, enemy);
        if (gameSettings.showRange && distToEnemy <= player.attackRange + 50) {
            ctx.beginPath();
            ctx.arc(player.x + player.width/2, player.y + player.height/2, player.attackRange, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(74, 144, 226, 0.1)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(74, 144, 226, 0.5)';
            ctx.stroke();
        }
        
        // Draw projectiles
        projectiles.forEach(p => p.draw());
        
        // Draw damage numbers
        particles = particles.filter(p => p.update(1/60));
        particles.forEach(p => p.draw());
        
        drawMinimap();
        drawUI();
    }

    // Main game loop
    let lastTime = Date.now() / 1000;
    
    function gameLoop() {
        if (!gameRunning) return;
        
        const now = Date.now() / 1000;
        let deltaTime = Math.min(0.033, now - lastTime);
        lastTime = now;
        
        updateMovement(deltaTime);
        updateMinions(deltaTime);
        projectiles = projectiles.filter(p => p.update(deltaTime));
        
        // Mana regen
        player.mana = Math.min(player.maxMana, player.mana + player.manaRegen * deltaTime);
        
        // Wave management
        if (minions.length === 0 && waveCountdown <= 0) {
            waveCountdown = waveDelay;
        }
        if (waveCountdown > 0) {
            waveCountdown -= deltaTime * 1000;
            if (waveCountdown <= 0) {
                spawnWave();
            }
        }
        
        // Auto-attack logic - target closest enemy
        const closest = getClosestEnemy();
        if (distance(player, closest) <= player.attackRange) {
            playerAttack(closest);
        }
        enemyAttack();
        
        for (let key of skillKeys) {
            if (skills[key].cooldown > 0) {
                skills[key].cooldown -= deltaTime * 1000;
                if (skills[key].cooldown < 0) skills[key].cooldown = 0;
            }
        }
        
        updateSkillUI();
        draw();
        
        requestAnimationFrame(gameLoop);
    }
    
    function updateSkillUI() {
        for (let key of skillKeys) {
            const s = skills[key];
            const el = document.getElementById(`skill${key.toUpperCase()}`);
            const cdEl = document.getElementById(`cd-${key}`);
            const onCooldown = s.cooldown > 0;
            const noMana = player.mana < s.manaCost;
            
            el.classList.toggle('on-cooldown', onCooldown);
            el.classList.toggle('no-mana', !onCooldown && noMana);
            el.classList.toggle('disabled', onCooldown || noMana);
            
            if (onCooldown) {
                cdEl.textContent = `${(s.cooldown / 1000).toFixed(1)}s`;
            }
        }
    }

    // Event listeners
    canvas.addEventListener('click', (e) => {
        if (!gameRunning || !gameStarted) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const canvasX = (e.clientX - rect.left) * scaleX;
        const canvasY = (e.clientY - rect.top) * scaleY;
        
        player.targetX = canvasX;
        player.targetY = canvasY;
    });
    
    // Joystick controls
    const jZone = document.getElementById('joystickZone');
    const jBase = document.getElementById('joystickBase');
    const jThumb = document.getElementById('joystickThumb');
    const jRadius = 40;
    let jActive = false;
    let jId = null;
    let jDx = 0, jDy = 0;

    function jUpdate(clientX, clientY) {
        const rect = jBase.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        jDx = clientX - cx;
        jDy = clientY - cy;
        const dist = Math.sqrt(jDx * jDx + jDy * jDy);
        if (dist > jRadius) {
            jDx = jDx / dist * jRadius;
            jDy = jDy / dist * jRadius;
        }
        jThumb.style.left = (40 + jDx) + 'px';
        jThumb.style.top = (40 + jDy) + 'px';
        player.targetX = null;
        player.targetY = null;
    }

    function jStart(e) {
        if (!gameStarted) return;
        jActive = true;
        const p = e.touches ? e.touches[0] : e;
        jId = p.identifier !== undefined ? p.identifier : 0;
        jUpdate(p.clientX, p.clientY);
    }

    function jMove(e) {
        if (!jActive) return;
        e.preventDefault();
        if (e.touches) {
            for (let t of e.touches) {
                if (t.identifier === jId) { jUpdate(t.clientX, t.clientY); break; }
            }
        } else {
            jUpdate(e.clientX, e.clientY);
        }
    }

    function jEnd(e) {
        if (!jActive) return;
        if (e && e.changedTouches) {
            let match = false;
            for (let t of e.changedTouches) {
                if (t.identifier === jId) { match = true; break; }
            }
            if (!match) return;
        }
        jActive = false;
        jDx = 0; jDy = 0;
        jThumb.style.left = '40px';
        jThumb.style.top = '40px';
    }

    jZone.addEventListener('mousedown', jStart);
    document.addEventListener('mousemove', jMove);
    document.addEventListener('mouseup', jEnd);
    jZone.addEventListener('touchstart', jStart, { passive: true });
    document.addEventListener('touchmove', jMove, { passive: false });
    document.addEventListener('touchend', jEnd);
    document.addEventListener('touchcancel', jEnd);

    document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('settingsOverlay').classList.add('open');
    });
    document.getElementById('settingsClose').addEventListener('click', () => {
        document.getElementById('settingsOverlay').classList.remove('open');
    });
    document.querySelectorAll('#diffGroup .toggle-opt').forEach(el => {

            document.querySelectorAll('#diffGroup .toggle-opt').forEach(o => o.classList.remove('active'));
            el.classList.add('active');

    });
    
    // --- Drag-and-drop Custom HUD ---
    let editMode = false;
    let dragTarget = null;
    let dragOffX = 0, dragOffY = 0;
    let didDrag = false;
    const skillPanel = document.getElementById('skillPanel');

    function refreshPanelCustom() {
        const has = Array.from(document.querySelectorAll('.skill-btn')).some(el => el.dataset.customPos);
        skillPanel.classList.toggle('has-custom', has);
    }

    function loadLayout() {
        const ver = localStorage.getItem('mobaLayoutVer');
        if (ver !== '2') {
            localStorage.removeItem('mobaSkillLayout');
            localStorage.setItem('mobaLayoutVer', '2');
        }
        const saved = localStorage.getItem('mobaSkillLayout');
        if (saved) {
            const pos = JSON.parse(saved);
            for (let key of skillKeys) {
                if (pos[key]) {
                    const el = document.getElementById(`skill${key.toUpperCase()}`);
                    el.style.left = pos[key].left + 'px';
                    el.style.top = pos[key].top + 'px';
                    el.dataset.customPos = 'true';
                }
            }
        }
        refreshPanelCustom();
    }

    function saveLayout() {
        const pos = {};
        for (let key of skillKeys) {
            const el = document.getElementById(`skill${key.toUpperCase()}`);
            if (el.dataset.customPos) {
                pos[key] = { left: parseInt(el.style.left), top: parseInt(el.style.top) };
            }
        }
        localStorage.setItem('mobaSkillLayout', JSON.stringify(pos));
        refreshPanelCustom();
    }

    function resetLayout() {
        localStorage.removeItem('mobaSkillLayout');
        for (let key of skillKeys) {
            const el = document.getElementById(`skill${key.toUpperCase()}`);
            el.style.left = '';
            el.style.top = '';
            delete el.dataset.customPos;
        }
        refreshPanelCustom();
    }

    function setEditMode(on) {
        editMode = on;
        document.body.classList.toggle('edit-mode', on);
        document.getElementById('editModeToggle').textContent = on ? 'On' : 'Off';
        document.getElementById('editModeActions').style.display = on ? 'block' : 'none';
        if (on) {
            skillPanel.style.display = 'flex';
        } else if (!gameStarted) {
            skillPanel.style.display = 'none';
        }

        if (on) {
            for (let key of skillKeys) {
                const el = document.getElementById(`skill${key.toUpperCase()}`);
                if (!el.dataset.customPos) {
                    const rect = el.getBoundingClientRect();
                    el.style.left = rect.left + 'px';
                    el.style.top = rect.top + 'px';
                }
            }
        } else {
            for (let key of skillKeys) {
                const el = document.getElementById(`skill${key.toUpperCase()}`);
                if (!el.dataset.customPos) {
                    el.style.left = '';
                    el.style.top = '';
                }
            }
        }
        refreshPanelCustom();
    }

    document.getElementById('editModeToggle').addEventListener('click', () => {

    document.addEventListener('mousedown', (e) => {
        if (!editMode) return;
        const btn = e.target.closest('.skill-btn');
        if (!btn) return;
        e.preventDefault();
        dragTarget = btn;
        dragTarget.classList.add('dragging');
        const rect = btn.getBoundingClientRect();
        dragOffX = e.clientX - rect.left;
        dragOffY = e.clientY - rect.top;
    });

    document.addEventListener('mousemove', (e) => {
        if (!dragTarget) return;
        e.preventDefault();
        didDrag = true;
        const left = e.clientX - dragOffX;
        const top = e.clientY - dragOffY;
        dragTarget.style.left = left + 'px';
        dragTarget.style.top = top + 'px';
        dragTarget.dataset.customPos = 'true';
        refreshPanelCustom();
    });

    document.addEventListener('mouseup', () => {
        if (dragTarget) dragTarget.classList.remove('dragging');
        dragTarget = null;
    });

    for (let key of skillKeys) {
        const el = document.getElementById(`skill${key.toUpperCase()}`);
        function fireSkill(e) {
            e.stopPropagation();
            if (!gameStarted || editMode || didDrag) { didDrag = false; return; }
            useSkill(key);
        }
        el.addEventListener('click', fireSkill);
        el.addEventListener('touchstart', fireSkill, { passive: true });
    }
    
    loadLayout();
    resetGame();

    // Start screen
    let gameStarted = false;

    function drawStartScreen() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#0d2818');
        gradient.addColorStop(0.5, '#1a5030');
        gradient.addColorStop(1, '#0d2818');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Floating particles
        const t = Date.now();
        for (let i = 0; i < 15; i++) {
            const px = (Math.sin(t / 2000 + i * 3) * 0.5 + 0.5) * canvas.width;
            const py = (Math.sin(t / 3000 + i * 2) * 0.5 + 0.5) * canvas.height;
            ctx.fillStyle = `rgba(255,215,0,${0.06 + (i % 5) * 0.02})`;
            ctx.beginPath();
            ctx.arc(px, py, 2 + (i % 3), 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 60px Arial';
        ctx.fillText('MOBA ARENA', canvas.width / 2, canvas.height / 2 - 85);

        ctx.fillStyle = '#88cc88';
        ctx.font = '18px Arial';
        ctx.fillText('Wave-based Combat Arena', canvas.width / 2, canvas.height / 2 - 30);

        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 32px Arial';
        ctx.fillText('PLAY', canvas.width / 2, canvas.height / 2 + 65);

        ctx.fillStyle = '#ffd700';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ffd700';
        ctx.fillRect(canvas.width / 2 - 80, canvas.height / 2 + 80, 160, 3);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#aaa';
        ctx.font = '14px Arial';
        ctx.fillText('Click anywhere to start', canvas.width / 2, canvas.height / 2 + 125);

        // Hero silhouettes
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#4a90e2';
        ctx.fillRect(100, canvas.height / 2 - 20, 50, 50);
        ctx.fillStyle = '#e24a4a';
        ctx.fillRect(canvas.width - 150, canvas.height / 2 - 20, 50, 50);
        ctx.globalAlpha = 1;

        ctx.textAlign = 'left';
    }

    drawStartScreen();

    canvas.addEventListener('click', function startHandler() {
        if (gameStarted) return;
        gameStarted = true;
        document.getElementById('skillPanel').style.display = 'flex';
        document.getElementById('joystickZone').style.display = 'block';
        canvas.removeEventListener('click', startHandler);
        gameLoop();
    });
</script>
</body>
</html>
